<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIGURATION — compact shapes, close attributes
// ═══════════════════════════════════════════════════════════════════════════
const C = {
  entW: 94, entH: 32,
  weakGap: 4,
  attrRy: 13,
  diaHW: 40, diaHH: 22,
  attrLineCol: '#b0bcc8', attrLineW: 0.8,
  relLineCol: '#4b6478', relLineW: 1.5,

// ═══════════════════════════════════════════════════════════════════════════

// No shape overlaps: each row separated by 520px, entities 320-650px apart

const relDefs = [
  // User ↔ Vehicle
  { id:'r_owns', rel:'Owns', rt:'rel', from:'user', to:'vehicle', fc:'N', tc:'N',
    x:1000, y:460,

  { id:'r_isslic', rel:'Issues', rt:'ident', from:'rto', to:'license', fc:'1', tc:'N', x:250, y:460 },

  { id:'r_employs', rel:'Employs', rt:'rel', from:'rto', to:'officer', fc:'1', tc:'N', x:310, y:885 },
  // RTO ↔ Permit
  { id:'r_isspmt', rel:'Issues', rt:'ident', from:'rto', to:'permit', fc:'1', tc:'N', x:200, y:1150 },
  // Vehicle ↔ Insurance
  { id:'r_reqins', rel:'Requires', rt:'ident', from:'vehicle', to:'insurance', fc:'1', tc:'N', x:880, y:1000 },
  // Vehicle ↔ RC Book
  { id:'r_hasrc', rel:'Has', rt:'ident', from:'vehicle', to:'rc', fc:'1', tc:'1', x:1090, y:1000 },
  // Vehicle ↔ PUC
  { id:'r_haspuc', rel:'Has', rt:'ident', from:'vehicle', to:'puc', fc:'1', tc:'N', x:1250, y:1000 },
  // Vehicle ↔ Vehicle Log
  { id:'r_hasvc', rel:'Has', rt:'ident', from:'vehicle', to:'vcond', fc:'1', tc:'N', x:1420, y:1000 },
  // Vehicle ↔ Permit
  { id:'r_haspmt', rel:'Has', rt:'ident', from:'vehicle', to:'permit', fc:'1', tc:'N', x:660, y:1000 },
  // Vehicle ↔ Challan
  { id:'r_fined', rel:'Fined', rt:'ident', from:'vehicle', to:'challan', fc:'1', tc:'N', x:1425, y:720 },
  // Officer ↔ Challan
  { id:'r_isschl', rel:'Issues', rt:'ident', from:'officer', to:'challan', fc:'1', tc:'N', x:1090, y:900 },
  // E-Wallet ↔ Wallet Txn
  { id:'r_fromtx', rel:'From', rt:'ident', from:'ewallet', to:'wtxn', fc:'1', tc:'N', x:1720, y:165 },
  { id:'r_totx', rel:'To', rt:'ident', from:'ewallet', to:'wtxn', fc:'1', tc:'N', x:1730, y:265 },
  // Challan ↔ Wallet Txn
  { id:'r_paidvia', rel:'Paid via', rt:'ident', from:'challan', to:'wtxn', fc:'1', tc:'1', x:1860, y:460 },
];

// ═══════════════════════════════════════════════════════════════════════════
// BUILD FLAT NODE & EDGE ARRAYS
// ═══════════════════════════════════════════════════════════════════════════
const nodes = [];
const edges = [];
const nodeMap = {};

function addNode(id, type, text, x, y, gid, pid) {
  const n = { id, type, text, x, y, gid: gid||id, pid: pid||null };
  nodes.push(n);
  nodeMap[id] = n;
  return n;
}

function degToRad(d) { return d * Math.PI / 180; }

// Build entity nodes + attribute nodes
entityDefs.forEach(e => {
  addNode(e.id, e.type, e.name, e.x, e.y, e.id);

  const n = e.attrs.length;
  if (!n) return;
  const startRad = degToRad(e.sa || 90);
  const step = (2 * Math.PI) / n;
  const radius = e.r || 100;

  e.attrs.forEach((a, i) => {
    const angle = startRad - i * step;
    const ax = e.x + Math.cos(angle) * radius;
    const ay = e.y - Math.sin(angle) * radius;
    const aid = `${e.id}_a${i}`;

    addNode(aid, a.t, a.n, ax, ay, e.id, e.id);
    edges.push({ f: e.id, t: aid, et: 'attr' });

    // Composite children
    if (a.ch && a.ch.length) {
      const outAngle = Math.atan2(ay - e.y, ax - e.x);
      const cn = a.ch.length;
      const spread = 0.3 * cn;
      a.ch.forEach((ch, j) => {
        const off = cn > 1 ? (j / (cn - 1) - 0.5) * spread : 0;
        const cid = `${aid}_c${j}`;
        addNode(cid, 'a', ch,
          ax + Math.cos(outAngle + off) * C.childR,
          ay + Math.sin(outAngle + off) * C.childR,
          e.id, aid
        );
        edges.push({ f: aid, t: cid, et: 'attr' });
      });
    }
  });
});

// Build relationship diamond nodes + their attributes + connection edges
relDefs.forEach(r => {
  addNode(r.id, r.rt, r.rel, r.x, r.y, r.id);

  edges.push({ f: r.from, t: r.id, et: 'rel', card: r.fc, ce: 'from' });
  edges.push({ f: r.id, t: r.to, et: 'rel', card: r.tc, ce: 'to' });

  if (r.attrs && r.attrs.length) {
    const rn = r.attrs.length;
    const rStart = degToRad(r.asa || 0);
    const rStep = (2 * Math.PI) / rn;
    const rRad = r.ar || 90;
    r.attrs.forEach((a, i) => {
      const angle = rStart - i * rStep;
      const aid = `${r.id}_a${i}`;
      addNode(aid, a.t, a.n,
        r.x + Math.cos(angle) * rRad,
        r.y - Math.sin(angle) * rRad,
        r.id, r.id
      );
      edges.push({ f: r.id, t: aid, et: 'attr' });
    });
  }
});

// ═══════════════════════════════════════════════════════════════════════════
// CANVAS SETUP — DPR-aware for crisp text
// ═══════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W, H, panX = 0, panY = 0, zoom = 1;
let isPanning = false, psx, psy;
let dragNode = null, dragGid = null, dox, doy;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = `${W}px`;
  canvas.style.height = `${H}px`;
  draw();
}
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════════════════════
// DRAWING HELPERS
// ═══════════════════════════════════════════════════════════════════════════

function measureText(text, font) {
  ctx.save();
  ctx.font = font || C.font;
  const lines = text.split('\n');
  let maxW = 0;
  lines.forEach(l => { const m = ctx.measureText(l).width; if (m > maxW) maxW = m; });
  ctx.restore();
  return { w: maxW, lines: lines.length };
}

function fillText(x, y, text, font, color, underline) {
  ctx.save();
  ctx.font = font || C.font;
  ctx.fillStyle = color || C.textCol;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const lines = text.split('\n');
  const lh = parseFloat(((font || C.font).match(/(\d+\.?\d*)px/) || [])[1] || '12') * 1.3;
  const totalH = (lines.length - 1) * lh;
  lines.forEach((line, i) => {
    const ly = y - totalH / 2 + i * lh;
    ctx.fillText(line, x, ly);
    if (underline) {
      const tw = ctx.measureText(line).width;
      ctx.beginPath();
      ctx.moveTo(x - tw / 2, ly + lh * 0.35);
      ctx.lineTo(x + tw / 2, ly + lh * 0.35);
      ctx.strokeStyle = color || C.textCol;
      ctx.lineWidth = 1.1;
      ctx.stroke();
    }
  });
  ctx.restore();
}

function drawEntityRect(x, y, text, isWeak) {
  const m = measureText(text, C.bFont);
  const w = Math.max(C.entW, m.w + 22);
  const h = Math.max(C.entH, m.lines * 15 + 10);

  ctx.save();
  ctx.fillStyle = isWeak ? '#fff2d8' : '#e0f0ff';
  ctx.strokeStyle = C.stroke;
  ctx.lineWidth = 1.6;

  if (isWeak) {
    const g = C.weakGap;
    ctx.fillRect(x - w/2 - g, y - h/2 - g, w + 2*g, h + 2*g);
    ctx.strokeRect(x - w/2 - g, y - h/2 - g, w + 2*g, h + 2*g);
    ctx.strokeRect(x - w/2, y - h/2, w, h);
  } else {
    ctx.fillRect(x - w/2, y - h/2, w, h);
    ctx.strokeRect(x - w/2, y - h/2, w, h);
  }
  ctx.restore();
  fillText(x, y, text, C.bFont, C.textCol);
}

function drawAttrEllipse(x, y, text, type) {
  const m = measureText(text, C.font);
  const rx = Math.max(32, m.w / 2 + 10);
  const ry = Math.max(C.attrRy, m.lines * 7 + 6);

  ctx.save();
  ctx.fillStyle = type === 'pk' ? '#fff7d6' : type === 'der' ? '#fff4e8' : type === 'mv' ? '#eafaf2' : '#ffffff';
  ctx.strokeStyle = C.stroke;
  ctx.lineWidth = 1.1;

  if (type === 'der') ctx.setLineDash([4, 3]);

  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.setLineDash([]);

  if (type === 'mv') {
    ctx.beginPath();
    ctx.ellipse(x, y, rx - 4, ry - 3, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
  fillText(x, y, text, C.font, C.textCol, type === 'pk');
}

function drawDiamond(x, y, text, isIdent) {
  const m = measureText(text, C.sFont);
  const hw = Math.max(C.diaHW, m.w / 2 + 14);
  const hh = Math.max(C.diaHH, m.lines * 7 + 10);

  ctx.save();
  ctx.fillStyle = isIdent ? '#f1ecff' : '#eaf7ef';
  ctx.strokeStyle = C.stroke;
  ctx.lineWidth = 1.5;

  ctx.beginPath();
  ctx.moveTo(x, y - hh);
  ctx.lineTo(x + hw, y);
  ctx.lineTo(x, y + hh);
  ctx.lineTo(x - hw, y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  if (isIdent) {
    const ihw = hw - 6, ihh = hh - 4;
    ctx.beginPath();
    ctx.moveTo(x, y - ihh);
    ctx.lineTo(x + ihw, y);
    ctx.lineTo(x, y + ihh);
    ctx.lineTo(x - ihw, y);
    ctx.closePath();
    ctx.stroke();
  }

  ctx.restore();
  fillText(x, y, text, C.sFont, C.textCol);
}

function drawLine(x1, y1, x2, y2, isRelation) {
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = isRelation ? C.relLineCol : C.attrLineCol;
  ctx.lineWidth = isRelation ? C.relLineW : C.attrLineW;
  ctx.stroke();
}

function drawCard(x1, y1, x2, y2, card, end) {
  if (!card) return;
  const t = 0.18;
  let lx, ly;
  if (end === 'from') {
    lx = x2 + (x1 - x2) * t;
    ly = y2 + (y1 - y2) * t;
  } else {
    lx = x1 + (x2 - x1) * t;
    ly = y1 + (y2 - y1) * t;
  }
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const px = -Math.sin(angle) * 12;
  const py = Math.cos(angle) * 12;
  ctx.save();
  ctx.font = C.cardFont;
  ctx.fillStyle = C.cardCol;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(card, lx + px, ly + py);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════
// MAIN DRAW
// ═══════════════════════════════════════════════════════════════════════════
function drawGrid() {
  const step = 100;
  const x0 = Math.floor(-panX / zoom / step) * step - step;
  const y0 = Math.floor(-panY / zoom / step) * step - step;
  const x1 = x0 + W / zoom + 2 * step;
  const y1 = y0 + H / zoom + 2 * step;
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.035)';
  ctx.lineWidth = 0.5;
  for (let gx = x0; gx <= x1; gx += step) {
    ctx.beginPath(); ctx.moveTo(gx, y0); ctx.lineTo(gx, y1); ctx.stroke();
  }
  for (let gy = y0; gy <= y1; gy += step) {
    ctx.beginPath(); ctx.moveTo(x0, gy); ctx.lineTo(x1, gy); ctx.stroke();
  }
  ctx.restore();
}

function draw() {
  ctx.save();
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#f7f9fc';
  ctx.fillRect(0, 0, W, H);
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  drawGrid();

  // Pass 1a: Draw attribute edges (thin, light — background layer)
  edges.forEach(e => {
    if (e.et !== 'attr') return;
    const fn = nodeMap[e.f], tn = nodeMap[e.t];
    if (!fn || !tn) return;
    drawLine(fn.x, fn.y, tn.x, tn.y, false);
  });

  // Pass 1b: Draw relationship edges (thicker, darker — on top of attr lines)
  edges.forEach(e => {
    if (e.et !== 'rel') return;
    const fn = nodeMap[e.f], tn = nodeMap[e.t];
    if (!fn || !tn) return;
    drawLine(fn.x, fn.y, tn.x, tn.y, true);
    drawCard(fn.x, fn.y, tn.x, tn.y, e.card, e.ce);
  });

  // Pass 2: Draw all nodes (shapes on top of lines)
  const attrNodes = nodes.filter(n => ['a','pk','der','mv','comp'].includes(n.type));
  const mainNodes = nodes.filter(n => !['a','pk','der','mv','comp'].includes(n.type));

  attrNodes.forEach(n => drawAttrEllipse(n.x, n.y, n.text, n.type));
  mainNodes.forEach(n => {
    switch (n.type) {
      case 'entity': drawEntityRect(n.x, n.y, n.text, false); break;
      case 'weak':   drawEntityRect(n.x, n.y, n.text, true); break;
      case 'rel':    drawDiamond(n.x, n.y, n.text, false); break;
      case 'ident':  drawDiamond(n.x, n.y, n.text, true); break;
    }
  });

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════════════════════

function screenToWorld(sx, sy) {
  return { x: (sx - panX) / zoom, y: (sy - panY) / zoom };
}

function hitTest(wx, wy) {
  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const dx = wx - n.x, dy = wy - n.y;
    if (['entity','weak'].includes(n.type)) {
      const m = measureText(n.text, C.bFont);
      const hw = Math.max(C.entW, m.w + 22) / 2 + (n.type === 'weak' ? C.weakGap : 0);
      const hh = Math.max(C.entH, m.lines * 15 + 10) / 2 + (n.type === 'weak' ? C.weakGap : 0);
      if (Math.abs(dx) <= hw && Math.abs(dy) <= hh) return n;
    } else if (['rel','ident'].includes(n.type)) {
      const m = measureText(n.text, C.sFont);
      const hw = Math.max(C.diaHW, m.w/2 + 14);
      const hh = Math.max(C.diaHH, m.lines * 7 + 10);
      if (Math.abs(dx)/hw + Math.abs(dy)/hh <= 1) return n;
    } else {
      const m = measureText(n.text, C.font);
      const rx = Math.max(32, m.w / 2 + 10);
      const ry = Math.max(C.attrRy, m.lines * 7 + 6);
      if ((dx*dx)/(rx*rx) + (dy*dy)/(ry*ry) <= 1) return n;
    }
  }
  return null;
}

canvas.addEventListener('mousedown', e => {
  const w = screenToWorld(e.clientX, e.clientY);
  const hit = hitTest(w.x, w.y);
  if (hit) {
    if (['entity','weak','rel','ident'].includes(hit.type)) {
      dragGid = hit.gid;
      dragNode = null;
    } else {
      dragNode = hit;
      dragGid = null;
    }
    dox = w.x; doy = w.y;
    canvas.classList.add('dragging');
  } else {
    isPanning = true;
    psx = e.clientX - panX;
    psy = e.clientY - panY;
    canvas.classList.add('dragging');
  }
});

window.addEventListener('mousemove', e => {
  if (isPanning) {
    panX = e.clientX - psx;
    panY = e.clientY - psy;
    draw();
    return;
  }
  if (dragGid || dragNode) {
    const w = screenToWorld(e.clientX, e.clientY);
    const ddx = w.x - dox, ddy = w.y - doy;
    dox = w.x; doy = w.y;

    if (dragGid) {
      nodes.forEach(n => { if (n.gid === dragGid) { n.x += ddx; n.y += ddy; } });
    } else if (dragNode) {
      const parentId = dragNode.id;
      dragNode.x += ddx;
      dragNode.y += ddy;
      nodes.forEach(n => { if (n.pid === parentId) { n.x += ddx; n.y += ddy; } });
    }
    draw();
  }
});

window.addEventListener('mouseup', () => {
  isPanning = false;
  dragGid = null;
  dragNode = null;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  const oldZoom = zoom;
  zoom = Math.max(0.12, Math.min(2.5, zoom + delta));
  const r = zoom / oldZoom;
  panX = e.clientX - (e.clientX - panX) * r;
  panY = e.clientY - (e.clientY - panY) * r;
  draw();
}, { passive: false });

function zoomBy(d) {
  const oldZoom = zoom;
  zoom = Math.max(0.12, Math.min(2.5, zoom + d));
  const r = zoom / oldZoom;
  panX = W/2 - (W/2 - panX) * r;
  panY = H/2 - (H/2 - panY) * r;
  draw();
}

function resetView() {
  panX = 0; panY = 0; zoom = 1;
  draw();
}

function fitAll() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    if (n.x < minX) minX = n.x;
    if (n.y < minY) minY = n.y;
    if (n.x > maxX) maxX = n.x;
    if (n.y > maxY) maxY = n.y;
  });
  const pad = 160;
  minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const ww = maxX - minX, hh = maxY - minY;
  zoom = Math.min(W / ww, (H - 50) / hh, 1.5);
  panX = (W - ww * zoom) / 2 - minX * zoom;
  panY = (H - hh * zoom) / 2 - minY * zoom + 20;
  draw();
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════
resize();
setTimeout(fitAll, 50);
</script>
</body>
